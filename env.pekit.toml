[wrap]
# --user keeps everything the container writes (out/, regenerated bindings)
# owned by the host user instead of root; HOME=/tmp gives a writable home for
# tool caches (Go build cache etc.). The image is built to run rootless (Rust
# in /opt, /ccache world-writable).
#
# Persist ccache across runs (named volume — created on demand, no host dep) so
# incremental rebuilds don't recompile cold after each stage's fresh source copy.
# Not adding --device /dev/kvm: it'd force kvm on every runner; test-kunit.sh
# uses -machine accel=kvm:tcg and falls back to TCG, so this stays portable.
command = 'docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp -v "$PWD":"$PWD" -w "$PWD" -v pkm-ccache:/ccache pkm-build sh -euc {{command}}'
