# kernel-debugsource — the kernel sources referenced by the debug info, staged
# under /usr/src/debug/kernel-<release> (paths sanitized by debugedit so gdb
# resolves them against this package). Produced by build.debuginfo.

[package]
description = "Peios Kernel — debug sources"

[dependencies]
kernel = "{{version}}"

[files]
"debuginfo:usr/src/debug/**" = "usr/src/debug"
