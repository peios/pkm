# bpftool — inspect and manipulate eBPF programs, maps, and BTF. Built from the
# in-tree tools/bpf/bpftool (build.tools). The kernel enables BPF/BPF_SYSCALL/
# BPF_JIT, so bpftool has live kernel support.
#
# Runtime shared-lib deps (TODO — see D4):
#   libelf libcrypto libz libcap libbfd libopcodes libc

[package]
description = "bpftool — eBPF program/map/BTF introspection (from Linux 7.0.9 tools/bpf/bpftool)"

# bpftool's Makefile installs to /usr/sbin; PSD-009 §3.4.1 has no sbin (Peios is
# bin-only), and bpftool has no compiled-in self-path, so relocate it to usr/bin.
[files]
"tools:usr/sbin/bpftool" = "usr/bin/bpftool"
"tools:usr/share/bash-completion/completions/bpftool" = "usr/share/bash-completion/completions/bpftool"
"tools:usr/share/man/man8/bpftool*.8" = "usr/share/man/man8/"
