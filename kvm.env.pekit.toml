# Local-fast env variant: same as the default wrap plus --device /dev/kvm for
# KVM-accelerated QEMU (test.kunit). Opt in with `pekit <verb> <target> --env kvm`.
# Requires /dev/kvm on the host; the default env stays portable (TCG fallback).
[wrap]
command = 'docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp -v "$PWD":"$PWD" -w "$PWD" -v pkm-ccache:/ccache --device /dev/kvm pkm-build sh -euc {{command}}'
